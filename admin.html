<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/styles/style.css">
  <title>SupportFlow Admin — Панель управления</title>
  <style>
    /* Дополнительные стили только для админки */
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: white;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-top: 4px solid var(--color-primary, #4a90e2);
    }
    .stat-card.high { border-top-color: #dc2626; }
    .stat-card.medium { border-top-color: #ca8a04; }
    .stat-card.low { border-top-color: #16a34a; }
    .stat-value { font-size: 24px; font-weight: bold; }
    .stat-label { font-size: 12px; color: #6b7280; }
    
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .filters select, .filters input {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    
    .ticket-row:hover { background: #f8f9fa; }
    
    .action-btn {
      padding: 4px 8px;
      margin: 2px;
      font-size: 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .action-btn.view { background: #4a90e2; color: white; }
    .action-btn.resolve { background: #28a745; color: white; }
    .action-btn.escalate { background: #dc2626; color: white; }
    
    /* Модальное окно */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: white;
      padding: 25px;
      border-radius: 12px;
      max-width: 600px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-close {
      position: absolute;
      top: 15px; right: 20px;
      font-size: 24px;
      cursor: pointer;
      color: #6b7280;
    }
    .modal-close:hover { color: #333; }
    .modal-actions {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .modal-actions select, .modal-actions textarea {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .modal-actions textarea { min-height: 80px; resize: vertical; }
    
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #6b7280;
    }
  </style>
</head>
<body>

<header>
  <h1>🔐 SupportFlow Admin</h1>
  <p>Панель управления заявками</p>
</header>

<main class="container">
  
  <!-- Статистика -->
  <section class="section">
    <div class="admin-header">
      <h2>📊 Статистика</h2>
      <button class="btn btn-secondary" onclick="clearAllTickets()">🗑️ Очистить все</button>
    </div>
    <div class="admin-stats" id="adminStats"></div>
  </section>
  
  <!-- Фильтры -->
  <section class="section">
    <h2>🔍 Фильтры</h2>
    <div class="filters">
      <select id="filterPriority" onchange="renderTickets()">
        <option value="all">Все приоритеты</option>
        <option value="high">🔴 Высокий</option>
        <option value="medium">🟡 Средний</option>
        <option value="low">🟢 Низкий</option>
      </select>
      <select id="filterStatus" onchange="renderTickets()">
        <option value="all">Все статусы</option>
        <option value="open">🟢 Открытые</option>
        <option value="in_progress">🟡 В работе</option>
        <option value="resolved">✅ Решённые</option>
        <option value="escalated">🔁 Эскалированные</option>
      </select>
      <input type="text" id="searchQuery" placeholder="Поиск..." oninput="renderTickets()">
      <button class="btn" onclick="renderTickets()">Применить</button>
    </div>
  </section>
  
  <!-- Таблица заявок -->
  <section class="section">
    <h2>🎫 Заявки</h2>
    <div class="table-wrapper">
      <table id="ticketsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Пользователь</th>
            <th>Тип</th>
            <th>Приоритет</th>
            <th>Статус</th>
            <th>Создан</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="ticketsBody"></tbody>
      </table>
    </div>
    <div id="emptyState" class="empty-state" style="display:none;">
      <p>📭 Нет заявок для отображения</p>
      <p class="text-small">Новые заявки появятся здесь после создания на главной странице</p>
    </div>
  </section>
  
</main>

<!-- Модальное окно детали заявки -->
<div class="modal" id="ticketModal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <h3 id="modalTicketId"></h3>
    <div id="modalTicketBody"></div>
    <div class="modal-actions">
      <label><strong>Изменить статус:</strong></label>
      <select id="modalStatus">
        <option value="open">🟢 Открыт</option>
        <option value="in_progress">🟡 В работе</option>
        <option value="resolved">✅ Решён</option>
        <option value="escalated">🔁 Эскалирован</option>
      </select>
      <textarea id="modalNote" placeholder="Внутренняя заметка..."></textarea>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn" onclick="saveTicketChanges()">💾 Сохранить</button>
        <button class="btn btn-success" onclick="sendReply()">📤 Ответить</button>
        <button class="btn btn-danger" onclick="deleteTicket()">🗑️ Удалить</button>
      </div>
    </div>
  </div>
</div>

<footer>
  <p>SupportFlow Admin • <a href="index.html">← Вернуться на главную</a></p>
</footer>

<script src="assets/script/admin.js"></script>
</body>
</html>
